name: ArdenPy Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run basic tests
      run: |
        python run_basic_tests.py
    
    - name: Test import
      run: |
        python -c "import ardenpy; print('✅ ArdenPy import successful')"
    
    - name: Test basic configuration
      run: |
        python -c "
        import ardenpy
        ardenpy.configure(api_key='arden_test_123456')
        print('✅ Configuration successful')
        "
    
    - name: Test API key formats
      run: |
        python -c "
        import ardenpy
        
        # Test live API key format
        live_key = 'arden_live_3e6159f645814adfa86b01f8c368d503'
        ardenpy.configure(api_key=live_key, api_url='https://api.arden.sh')
        print(f'✅ Live API key format valid: {live_key[:20]}...')
        
        # Test test API key format  
        test_key = 'arden_test_79ca7d77540646be88ce65f276adc32d'
        ardenpy.configure(api_key=test_key, api_url='https://api-test.arden.sh')
        print(f'✅ Test API key format valid: {test_key[:20]}...')
        "
    
    - name: Test guard_tool functionality
      run: |
        python -c "
        import ardenpy
        
        # Configure
        ardenpy.configure(api_key='test_key', api_url='https://test.api.com')
        
        # Test guard_tool wrapping
        def test_function(x, y):
            return x + y
        
        protected_function = ardenpy.guard_tool('test.add', test_function)
        print('✅ guard_tool function wrapping successful')
        "
